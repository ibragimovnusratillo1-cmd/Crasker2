<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Patients — CareTrack MRMS</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-title">🧑‍🤝‍🧑 Patients</div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-primary" id="add-btn" onclick="openAdd()">+ Add Patient</button>
      </div>
    </header>
    <main class="page-content">

      <div class="card mb-16">
        <div class="card-body" style="padding:14px 20px">
          <div class="search-bar">
            <div class="search-wrap">
              <span class="search-icon">🔍</span>
              <input type="text" id="q" placeholder="Search name, email, blood type..." oninput="renderTable()"/>
            </div>
            <select class="filter-select" id="f-doc" onchange="renderTable()">
              <option value="">All Doctors</option>
            </select>
            <select class="filter-select" id="f-gender" onchange="renderTable()">
              <option value="">All Genders</option>
              <option>Male</option><option>Female</option><option>Other</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">Patient Records</span>
          <span id="count" class="text-muted"></span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>#</th><th>Name</th><th>Age</th><th>Gender</th><th>Blood</th><th>Assigned Doctor</th><th>Contact</th><th>Actions</th></tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
        <div id="empty" class="empty-state hidden">
          <div class="empty-ico">🧑‍🤝‍🧑</div><p>No patients found.</p>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay hidden" id="modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Add Patient</span>
      <button class="modal-close" onclick="closeModal('modal')">✕</button>
    </div>
    <div class="modal-body">
      <form id="form" onsubmit="return false">
        <input type="hidden" name="id"/>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">First Name <span>*</span></label>
            <input class="form-control" name="firstName" placeholder="Emily" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Last Name <span>*</span></label>
            <input class="form-control" name="lastName" placeholder="Johnson" required/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Date of Birth</label>
            <input class="form-control" name="dob" type="date"/>
          </div>
          <div class="form-group">
            <label class="form-label">Gender</label>
            <select class="form-control" name="gender">
              <option>Male</option><option>Female</option><option>Other</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Blood Type</label>
            <select class="form-control" name="bloodType">
              <option value="">Unknown</option>
              <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
              <option>AB+</option><option>AB-</option><option>O+</option><option>O-</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Assigned Doctor</label>
            <select class="form-control" name="doctorId" id="doc-select">
              <option value="">— Unassigned —</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-control" name="email" type="email" placeholder="patient@mail.com"/>
          </div>
          <div class="form-group">
            <label class="form-label">Phone</label>
            <input class="form-control" name="phone" placeholder="+1-555-0000"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Address</label>
          <input class="form-control" name="address" placeholder="123 Main St"/>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal')">Cancel</button>
      <button class="btn btn-teal" onclick="save()">💾 Save Patient</button>
    </div>
  </div>
</div>

<script src="/js/shared.js"></script>
<script>
let patients = [], doctors = [];
const user = Auth.require();
if (user) {
  renderSidebar('patients');
  if (!Auth.isAdmin()) document.getElementById('add-btn').classList.add('hidden');
  load();
}

async function load() {
  [patients, doctors] = await Promise.all([API.get('/patients'), API.get('/doctors')]);

  const fSel = document.getElementById('f-doc');
  const dSel = document.getElementById('doc-select');
  fSel.innerHTML = '<option value="">All Doctors</option>';
  dSel.innerHTML = '<option value="">— Unassigned —</option>';
  doctors.forEach(d => {
    const label = `Dr. ${d.firstName} ${d.lastName}`;
    fSel.appendChild(new Option(label, d.id));
    dSel.appendChild(new Option(label, d.id));
  });
  renderTable();
}

function renderTable() {
  const q      = document.getElementById('q').value.toLowerCase();
  const docId  = document.getElementById('f-doc').value;
  const gender = document.getElementById('f-gender').value;
  const isAdmin= Auth.isAdmin();

  let list = patients;
  if (q)      list = list.filter(p => `${p.firstName} ${p.lastName} ${p.email||''} ${p.bloodType||''}`.toLowerCase().includes(q));
  if (docId)  list = list.filter(p => String(p.doctorId) === String(docId));
  if (gender) list = list.filter(p => p.gender === gender);

  document.getElementById('count').textContent = `${list.length} patient(s)`;
  const empty = document.getElementById('empty');
  const tbody = document.getElementById('tbody');
  if (!list.length) { tbody.innerHTML=''; empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');

  tbody.innerHTML = list.map((p, i) => `
    <tr>
      <td class="text-muted">${i+1}</td>
      <td>
        <a class="link fw-bold" href="/pages/patient-profile.html?id=${p.id}">
          ${p.firstName} ${p.lastName}
        </a>
      </td>
      <td>${calcAge(p.dob)}</td>
      <td>${p.gender||'—'}</td>
      <td><span class="badge badge-gray">${p.bloodType||'—'}</span></td>
      <td style="font-size:12.5px">${p.doctorName||'—'}</td>
      <td style="font-size:12px">${p.email||'—'}</td>
      <td>
        <div class="flex gap-8">
          <a class="btn btn-ghost btn-sm" href="/pages/patient-profile.html?id=${p.id}">👁</a>
          <button class="btn btn-ghost btn-sm" onclick="openEdit(${p.id})">✏️</button>
          ${isAdmin ? `<button class="btn btn-danger btn-sm" onclick="del(${p.id})">🗑</button>` : ''}
        </div>
      </td>
    </tr>`).join('');
}

function openAdd() {
  document.getElementById('modal-title').textContent = 'Add Patient';
  resetForm('form');
  openModal('modal');
}
function openEdit(id) {
  const p = patients.find(x => x.id === id);
  document.getElementById('modal-title').textContent = 'Edit Patient';
  fillForm('form', { ...p, doctorId: p.doctorId || '' });
  openModal('modal');
}
async function save() {
  const data = collectForm('form');
  if (!data.firstName || !data.lastName) { showToast('Name is required.', 'danger'); return; }
  if (data.doctorId) data.doctorId = +data.doctorId;
  try {
    if (data.id) { await API.put(`/patients/${data.id}`, data); showToast('Patient updated!'); }
    else         { await API.post('/patients', data);            showToast('Patient added!'); }
    closeModal('modal'); await load();
  } catch(e) { showToast(e.message, 'danger'); }
}
async function del(id) {
  const p = patients.find(x => x.id === id);
  confirmDelete(`Delete ${p.firstName} ${p.lastName} and all their diagnoses?`, async () => {
    try { await API.delete(`/patients/${id}`); showToast('Patient deleted.', 'danger'); await load(); }
    catch(e) { showToast(e.message, 'danger'); }
  });
}
</script>
</body>
</html>
